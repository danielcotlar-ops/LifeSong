<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeSong Admin</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN with custom config -->
  <script>
    window.tailwind = window.tailwind || {};
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0F172A', light: '#1E293B', mid: '#162032' },
            gold: { DEFAULT: '#D4AF37', dark: '#B8962E', light: '#F0D060' },
            cream: { DEFAULT: '#FDFBF7', dim: '#E8E4DA' },
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <!-- React + Babel CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #0F172A;
      color: #FDFBF7;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    ::-moz-selection { background: rgba(212,175,55,0.3); color: #FDFBF7; }
    ::selection { background: rgba(212,175,55,0.3); color: #FDFBF7; }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #D4AF37;
      color: #0F172A;
      font-weight: 600;
      border-radius: 9999px;
      padding: 0.875rem 2rem;
      font-size: 0.9375rem;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      outline: none;
    }
    .btn-gold:hover {
      background: #E8C844;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(212,175,55,0.4);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(253,251,247,0.2);
      color: rgba(253,251,247,0.7);
      border-radius: 9999px;
      padding: 0.875rem 2rem;
      font-size: 0.9375rem;
      letter-spacing: 0.02em;
      transition: border-color 0.2s ease, color 0.2s ease;
      cursor: pointer;
      background: transparent;
      outline: none;
    }
    .btn-ghost:hover {
      border-color: rgba(212,175,55,0.5);
      color: #D4AF37;
    }

    /* Admin-specific */
    .admin-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(253,251,247,0.15);
      border-radius: 0.5rem;
      color: #FDFBF7;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .admin-input:focus {
      border-color: rgba(212,175,55,0.6);
    }
    .admin-input::-moz-placeholder {
      color: rgba(253,251,247,0.3);
    }
    .admin-input::placeholder {
      color: rgba(253,251,247,0.3);
    }

    table { border-collapse: collapse; width: 100%; }
    thead th {
      position: sticky;
      top: 0;
      background: #1E293B;
      z-index: 10;
    }
    tbody tr {
      transition: background 0.15s ease;
    }
    tbody tr:hover {
      background: rgba(212,175,55,0.06);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const _supabase = window.supabase.createClient(
      'https://wjulwosiewdqicevdddy.supabase.co',
      'sb_publishable_NToSonw_8bol5Fai9AGJjA_RCWOQ75J'
    );
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const ALLOWED_EMAILS = [
      'andywarthol@gmail.com',
      'george.revutsky@gmail.com',
      'danielcotlar@gmail.com',
    ];

    /* ════════════════════════════════════════════
       LoginPage
       ════════════════════════════════════════════ */
    function LoginPage({ onAuth }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        const normalizedEmail = email.trim().toLowerCase();
        if (!ALLOWED_EMAILS.includes(normalizedEmail)) {
          setError('Access denied. This portal is restricted to authorized team members.');
          return;
        }
        setLoading(true);
        const { error: authError } = await _supabase.auth.signInWithPassword({
          email: normalizedEmail,
          password,
        });
        setLoading(false);
        if (authError) {
          setError(authError.message);
        }
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1.5rem' }}>
          <div style={{
            width: '100%', maxWidth: '24rem',
            background: 'rgba(30,41,59,0.6)',
            border: '1px solid rgba(212,175,55,0.15)',
            borderRadius: '1rem',
            padding: '2.5rem 2rem',
          }}>
            <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
              <span style={{
                fontFamily: "'Playfair Display', Georgia, serif",
                fontSize: '1.75rem',
                color: '#D4AF37',
                letterSpacing: '0.05em',
              }}>LifeSong</span>
              <p style={{ marginTop: '0.5rem', fontSize: '0.8rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.4)' }}>
                Admin Portal
              </p>
            </div>

            <form onSubmit={handleSubmit}>
              <div style={{ marginBottom: '1rem' }}>
                <label style={{ display: 'block', fontSize: '0.75rem', color: 'rgba(253,251,247,0.5)', marginBottom: '0.375rem', letterSpacing: '0.05em', textTransform: 'uppercase' }}>Email</label>
                <input
                  type="email"
                  className="admin-input"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="you@example.com"
                  required
                />
              </div>
              <div style={{ marginBottom: '1.5rem' }}>
                <label style={{ display: 'block', fontSize: '0.75rem', color: 'rgba(253,251,247,0.5)', marginBottom: '0.375rem', letterSpacing: '0.05em', textTransform: 'uppercase' }}>Password</label>
                <input
                  type="password"
                  className="admin-input"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="Enter password"
                  required
                />
              </div>

              {error && (
                <div style={{
                  background: 'rgba(239,68,68,0.1)',
                  border: '1px solid rgba(239,68,68,0.3)',
                  borderRadius: '0.5rem',
                  padding: '0.75rem 1rem',
                  marginBottom: '1rem',
                  fontSize: '0.8125rem',
                  color: '#FCA5A5',
                }}>
                  {error}
                </div>
              )}

              <button
                type="submit"
                className="btn-gold"
                disabled={loading}
                style={{ width: '100%', opacity: loading ? 0.6 : 1 }}
              >
                {loading ? 'Signing in...' : 'Sign In'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       AdminHeader
       ════════════════════════════════════════════ */
    function AdminHeader({ email }) {
      const handleSignOut = async () => {
        await _supabase.auth.signOut();
      };

      return (
        <div style={{
          position: 'sticky', top: 0, zIndex: 50,
          background: 'rgba(15,23,42,0.95)',
          backdropFilter: 'blur(12px)',
          borderBottom: '1px solid rgba(212,175,55,0.12)',
          padding: '0.75rem 1.5rem',
        }}>
          <div style={{
            maxWidth: '72rem', margin: '0 auto',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <span style={{
              fontFamily: "'Playfair Display', Georgia, serif",
              fontSize: '1.25rem',
              color: '#D4AF37',
              letterSpacing: '0.05em',
            }}>
              LifeSong <span style={{ fontSize: '0.7rem', color: 'rgba(253,251,247,0.4)', letterSpacing: '0.1em', textTransform: 'uppercase', marginLeft: '0.5rem' }}>Admin</span>
            </span>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <span style={{ fontSize: '0.8125rem', color: 'rgba(253,251,247,0.5)' }}>{email}</span>
              <button
                onClick={handleSignOut}
                className="btn-ghost"
                style={{ padding: '0.5rem 1.25rem', fontSize: '0.8125rem' }}
              >
                Sign Out
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       StatsCards
       ════════════════════════════════════════════ */
    function StatsCards({ requests }) {
      const stats = useMemo(() => {
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const startOfWeek = new Date(startOfToday);
        startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

        let today = 0;
        let thisWeek = 0;
        for (const r of requests) {
          const d = new Date(r.created_at);
          if (d >= startOfToday) today++;
          if (d >= startOfWeek) thisWeek++;
        }
        return { total: requests.length, thisWeek, today };
      }, [requests]);

      const cards = [
        { label: 'Total Requests', value: stats.total },
        { label: 'This Week', value: stats.thisWeek },
        { label: 'Today', value: stats.today },
      ];

      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
          {cards.map((c) => (
            <div key={c.label} style={{
              background: 'rgba(30,41,59,0.5)',
              border: '1px solid rgba(212,175,55,0.1)',
              borderRadius: '0.75rem',
              padding: '1.25rem 1.5rem',
            }}>
              <div style={{ fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.4)', marginBottom: '0.5rem' }}>{c.label}</div>
              <div style={{ fontSize: '2rem', fontWeight: 600, color: '#D4AF37' }}>{c.value}</div>
            </div>
          ))}
        </div>
      );
    }

    /* ════════════════════════════════════════════
       RequestsTable
       ════════════════════════════════════════════ */
    function RequestsTable({ requests, onRefresh, refreshing, onArchive }) {
      const [sortKey, setSortKey] = useState('created_at');
      const [sortDir, setSortDir] = useState('desc');
      const [expandedId, setExpandedId] = useState(null);
      const [archiving, setArchiving] = useState(null);

      const handleArchive = async (e, id) => {
        e.stopPropagation();
        if (!confirm('Archive this song request?')) return;
        setArchiving(id);
        await onArchive('song_requests', id);
        setArchiving(null);
      };

      const handleSort = (key) => {
        if (sortKey === key) {
          setSortDir((d) => (d === 'asc' ? 'desc' : 'asc'));
        } else {
          setSortKey(key);
          setSortDir('asc');
        }
      };

      const sorted = useMemo(() => {
        return [...requests].sort((a, b) => {
          const aVal = a[sortKey] || '';
          const bVal = b[sortKey] || '';
          const cmp = typeof aVal === 'string' ? aVal.localeCompare(bVal) : aVal - bVal;
          return sortDir === 'asc' ? cmp : -cmp;
        });
      }, [requests, sortKey, sortDir]);

      const columns = [
        { key: 'created_at', label: 'Date' },
        { key: 'recipient_name', label: 'Recipient' },
        { key: 'occasion', label: 'Occasion' },
        { key: 'tone', label: 'Tone' },
        { key: 'energy', label: 'Energy' },
        { key: 'relationship', label: 'Relationship' },
        { key: '_actions', label: '' },
      ];

      const formatDate = (iso) => {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
      };

      const arrow = (key) => {
        if (sortKey !== key) return '';
        return sortDir === 'asc' ? ' \u25B2' : ' \u25BC';
      };

      const detailFields = [
        { key: 'feelings', label: 'Feelings' },
        { key: 'themes', label: 'Themes' },
        { key: 'chorus_hook', label: 'Chorus Hook' },
        { key: 'golden_memory', label: 'Golden Memory' },
        { key: 'avoid', label: 'Avoid Topics' },
      ];

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
            <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: '1.25rem', color: '#FDFBF7', margin: 0 }}>
              Song Requests
            </h2>
            <button
              onClick={onRefresh}
              className="btn-ghost"
              disabled={refreshing}
              style={{ padding: '0.5rem 1.25rem', fontSize: '0.8125rem', opacity: refreshing ? 0.5 : 1 }}
            >
              {refreshing ? 'Refreshing...' : 'Refresh'}
            </button>
          </div>

          <div style={{ borderRadius: '0.75rem', overflow: 'hidden', border: '1px solid rgba(212,175,55,0.1)' }}>
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr>
                    {columns.map((col) => (
                      <th
                        key={col.key}
                        onClick={() => handleSort(col.key)}
                        style={{
                          padding: '0.75rem 1rem',
                          textAlign: 'left',
                          fontSize: '0.7rem',
                          letterSpacing: '0.08em',
                          textTransform: 'uppercase',
                          color: sortKey === col.key ? '#D4AF37' : 'rgba(253,251,247,0.45)',
                          cursor: 'pointer',
                          userSelect: 'none',
                          whiteSpace: 'nowrap',
                          borderBottom: '1px solid rgba(212,175,55,0.1)',
                        }}
                      >
                        {col.label}{arrow(col.key)}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 && (
                    <tr>
                      <td colSpan={columns.length} style={{ padding: '3rem 1rem', textAlign: 'center', color: 'rgba(253,251,247,0.3)' }}>
                        No song requests yet
                      </td>
                    </tr>
                  )}
                  {sorted.map((row) => (
                    <React.Fragment key={row.id}>
                      <tr
                        onClick={() => setExpandedId(expandedId === row.id ? null : row.id)}
                        style={{ cursor: 'pointer', borderBottom: expandedId === row.id ? 'none' : '1px solid rgba(255,255,255,0.04)' }}
                      >
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)', whiteSpace: 'nowrap' }}>
                          {formatDate(row.created_at)}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#FDFBF7', fontWeight: 500 }}>
                          {row.recipient_name}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.occasion}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.tone}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.energy}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.relationship}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', textAlign: 'right' }}>
                          <button
                            onClick={(e) => handleArchive(e, row.id)}
                            disabled={archiving === row.id}
                            style={{
                              background: 'none', border: '1px solid rgba(239,68,68,0.3)',
                              borderRadius: '0.375rem', padding: '0.3rem 0.7rem',
                              fontSize: '0.7rem', color: '#FCA5A5', cursor: 'pointer',
                              opacity: archiving === row.id ? 0.4 : 1,
                              transition: 'background 0.15s, border-color 0.15s',
                            }}
                            onMouseOver={e => { e.target.style.background='rgba(239,68,68,0.1)'; e.target.style.borderColor='rgba(239,68,68,0.5)'; }}
                            onMouseOut={e => { e.target.style.background='none'; e.target.style.borderColor='rgba(239,68,68,0.3)'; }}
                          >{archiving === row.id ? '...' : 'Archive'}</button>
                        </td>
                      </tr>
                      {expandedId === row.id && (
                        <tr>
                          <td colSpan={columns.length} style={{
                            padding: '0 1rem 1rem 1rem',
                            borderBottom: '1px solid rgba(212,175,55,0.1)',
                          }}>
                            <div style={{
                              background: 'rgba(15,23,42,0.5)',
                              borderRadius: '0.5rem',
                              padding: '1rem 1.25rem',
                              display: 'grid',
                              gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
                              gap: '1rem',
                            }}>
                              {detailFields.map((f) => (
                                <div key={f.key}>
                                  <div style={{ fontSize: '0.65rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(212,175,55,0.6)', marginBottom: '0.25rem' }}>
                                    {f.label}
                                  </div>
                                  <div style={{ fontSize: '0.8125rem', color: 'rgba(253,251,247,0.8)', lineHeight: 1.5 }}>
                                    {row[f.key] || <span style={{ color: 'rgba(253,251,247,0.25)', fontStyle: 'italic' }}>Not provided</span>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       SpinLeadsTable
       ════════════════════════════════════════════ */
    function SpinLeadsTable({ leads, onRefresh, refreshing, onArchive }) {
      const [sortKey, setSortKey] = useState('created_at');
      const [sortDir, setSortDir] = useState('desc');
      const [archiving, setArchiving] = useState(null);

      const handleArchive = async (id) => {
        if (!confirm('Archive this spin lead?')) return;
        setArchiving(id);
        await onArchive('spin_leads', id);
        setArchiving(null);
      };

      const handleSort = (key) => {
        if (sortKey === key) {
          setSortDir((d) => (d === 'asc' ? 'desc' : 'asc'));
        } else {
          setSortKey(key);
          setSortDir('asc');
        }
      };

      const sorted = useMemo(() => {
        return [...leads].sort((a, b) => {
          const aVal = a[sortKey] || '';
          const bVal = b[sortKey] || '';
          const cmp = typeof aVal === 'string' ? aVal.localeCompare(bVal) : aVal - bVal;
          return sortDir === 'asc' ? cmp : -cmp;
        });
      }, [leads, sortKey, sortDir]);

      const columns = [
        { key: 'created_at', label: 'Date' },
        { key: 'email', label: 'Email' },
        { key: 'phone', label: 'Phone' },
        { key: 'prize', label: 'Prize' },
        { key: 'redeemed', label: 'Redeemed' },
        { key: '_actions', label: '' },
      ];

      const formatDate = (iso) => {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
      };

      const arrow = (key) => {
        if (sortKey !== key) return '';
        return sortDir === 'asc' ? ' \u25B2' : ' \u25BC';
      };

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
            <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: '1.25rem', color: '#FDFBF7', margin: 0 }}>
              Spin Leads
            </h2>
            <button
              onClick={onRefresh}
              className="btn-ghost"
              disabled={refreshing}
              style={{ padding: '0.5rem 1.25rem', fontSize: '0.8125rem', opacity: refreshing ? 0.5 : 1 }}
            >
              {refreshing ? 'Refreshing...' : 'Refresh'}
            </button>
          </div>

          <div style={{ borderRadius: '0.75rem', overflow: 'hidden', border: '1px solid rgba(212,175,55,0.1)' }}>
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr>
                    {columns.map((col) => (
                      <th
                        key={col.key}
                        onClick={() => handleSort(col.key)}
                        style={{
                          padding: '0.75rem 1rem',
                          textAlign: 'left',
                          fontSize: '0.7rem',
                          letterSpacing: '0.08em',
                          textTransform: 'uppercase',
                          color: sortKey === col.key ? '#D4AF37' : 'rgba(253,251,247,0.45)',
                          cursor: 'pointer',
                          userSelect: 'none',
                          whiteSpace: 'nowrap',
                          borderBottom: '1px solid rgba(212,175,55,0.1)',
                        }}
                      >
                        {col.label}{arrow(col.key)}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 && (
                    <tr>
                      <td colSpan={columns.length} style={{ padding: '3rem 1rem', textAlign: 'center', color: 'rgba(253,251,247,0.3)' }}>
                        No spin leads yet
                      </td>
                    </tr>
                  )}
                  {sorted.map((row) => (
                    <tr key={row.id} style={{ borderBottom: '1px solid rgba(255,255,255,0.04)' }}>
                      <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)', whiteSpace: 'nowrap' }}>
                        {formatDate(row.created_at)}
                      </td>
                      <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#FDFBF7', fontWeight: 500 }}>
                        {row.email || <span style={{ color: 'rgba(253,251,247,0.25)', fontStyle: 'italic' }}>—</span>}
                      </td>
                      <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                        {row.phone || <span style={{ color: 'rgba(253,251,247,0.25)', fontStyle: 'italic' }}>—</span>}
                      </td>
                      <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#D4AF37', fontWeight: 500 }}>
                        {row.prize}
                      </td>
                      <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem' }}>
                        <span style={{
                          display: 'inline-block',
                          padding: '0.2rem 0.6rem',
                          borderRadius: '9999px',
                          fontSize: '0.7rem',
                          fontWeight: 500,
                          letterSpacing: '0.05em',
                          background: row.redeemed ? 'rgba(34,197,94,0.15)' : 'rgba(253,251,247,0.06)',
                          color: row.redeemed ? '#4ADE80' : 'rgba(253,251,247,0.35)',
                          border: row.redeemed ? '1px solid rgba(34,197,94,0.3)' : '1px solid rgba(253,251,247,0.1)',
                        }}>
                          {row.redeemed ? 'Yes' : 'No'}
                        </span>
                      </td>
                      <td style={{ padding: '0.75rem 1rem', textAlign: 'right' }}>
                        <button
                          onClick={() => handleArchive(row.id)}
                          disabled={archiving === row.id}
                          style={{
                            background: 'none', border: '1px solid rgba(239,68,68,0.3)',
                            borderRadius: '0.375rem', padding: '0.3rem 0.7rem',
                            fontSize: '0.7rem', color: '#FCA5A5', cursor: 'pointer',
                            opacity: archiving === row.id ? 0.4 : 1,
                            transition: 'background 0.15s, border-color 0.15s',
                          }}
                          onMouseOver={e => { e.target.style.background='rgba(239,68,68,0.1)'; e.target.style.borderColor='rgba(239,68,68,0.5)'; }}
                          onMouseOut={e => { e.target.style.background='none'; e.target.style.borderColor='rgba(239,68,68,0.3)'; }}
                        >{archiving === row.id ? '...' : 'Archive'}</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       Dashboard
       ════════════════════════════════════════════ */
    /* ════════════════════════════════════════════
       OrdersTable
       ════════════════════════════════════════════ */
    function OrdersTable({ orders, onRefresh, refreshing, onStatusChange }) {
      const [expandedId, setExpandedId] = useState(null);
      const [updatingId, setUpdatingId] = useState(null);

      const statusColors = {
        pending_payment: { bg: 'rgba(234,179,8,0.1)', color: '#EAB308', label: 'Pending Payment' },
        paid: { bg: 'rgba(34,197,94,0.1)', color: '#22C55E', label: 'Paid' },
        in_progress: { bg: 'rgba(59,130,246,0.1)', color: '#3B82F6', label: 'In Progress' },
        delivered: { bg: 'rgba(168,85,247,0.1)', color: '#A855F7', label: 'Delivered' },
        refunded: { bg: 'rgba(239,68,68,0.1)', color: '#EF4444', label: 'Refunded' },
      };

      const handleStatusUpdate = async (e, orderId, newStatus) => {
        e.stopPropagation();
        setUpdatingId(orderId);
        await onStatusChange(orderId, newStatus);
        setUpdatingId(null);
      };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '1rem' }}>
            <button onClick={onRefresh} disabled={refreshing} style={{
              padding: '0.5rem 1rem', fontSize: '0.75rem', color: '#D4AF37', background: 'rgba(212,175,55,0.08)',
              border: '1px solid rgba(212,175,55,0.2)', borderRadius: '0.5rem', cursor: 'pointer',
              opacity: refreshing ? 0.5 : 1,
            }}>
              {refreshing ? 'Refreshing…' : '↻ Refresh'}
            </button>
          </div>
          {orders.length === 0 ? (
            <div style={{ padding: '3rem', textAlign: 'center', color: 'rgba(253,251,247,0.3)', fontSize: '0.875rem' }}>No orders yet</div>
          ) : (
            <div style={{ overflowX: 'auto', borderRadius: '0.75rem', border: '1px solid rgba(212,175,55,0.1)' }}>
              <table>
                <thead>
                  <tr>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Date</th>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Email</th>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Recipient</th>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Occasion</th>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Amount</th>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Status</th>
                    <th style={{ padding: '0.75rem 1rem', textAlign: 'left', fontSize: '0.7rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.45)' }}>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {orders.map((order) => {
                    const quiz = order.quiz_data || {};
                    const sc = statusColors[order.status] || statusColors.paid;
                    const isExpanded = expandedId === order.id;
                    return React.createElement(React.Fragment, { key: order.id },
                      <tr onClick={() => setExpandedId(isExpanded ? null : order.id)} style={{ cursor: 'pointer', borderBottom: '1px solid rgba(212,175,55,0.06)' }}>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.6)', whiteSpace: 'nowrap' }}>
                          {new Date(order.created_at).toLocaleDateString()}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.75)' }}>{order.email}</td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#FDFBF7' }}>{quiz.recipientName || '—'}</td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.6)', textTransform: 'capitalize' }}>{quiz.occasion || '—'}</td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#D4AF37' }}>${(order.amount_cents / 100).toFixed(2)}</td>
                        <td style={{ padding: '0.75rem 1rem' }}>
                          <span style={{
                            display: 'inline-block', padding: '0.2rem 0.6rem', borderRadius: '9999px',
                            fontSize: '0.7rem', fontWeight: 500, background: sc.bg, color: sc.color,
                          }}>{sc.label}</span>
                        </td>
                        <td style={{ padding: '0.75rem 1rem' }}>
                          <div style={{ display: 'flex', gap: '0.25rem' }}>
                            {order.status === 'paid' && (
                              <button
                                onClick={(e) => handleStatusUpdate(e, order.id, 'in_progress')}
                                disabled={updatingId === order.id}
                                style={{
                                  padding: '0.25rem 0.6rem', fontSize: '0.7rem', borderRadius: '0.375rem',
                                  background: 'rgba(59,130,246,0.1)', color: '#3B82F6', border: '1px solid rgba(59,130,246,0.2)',
                                  cursor: 'pointer', opacity: updatingId === order.id ? 0.5 : 1,
                                }}
                              >Start</button>
                            )}
                            {order.status === 'in_progress' && (
                              <button
                                onClick={(e) => handleStatusUpdate(e, order.id, 'delivered')}
                                disabled={updatingId === order.id}
                                style={{
                                  padding: '0.25rem 0.6rem', fontSize: '0.7rem', borderRadius: '0.375rem',
                                  background: 'rgba(168,85,247,0.1)', color: '#A855F7', border: '1px solid rgba(168,85,247,0.2)',
                                  cursor: 'pointer', opacity: updatingId === order.id ? 0.5 : 1,
                                }}
                              >Deliver</button>
                            )}
                          </div>
                        </td>
                      </tr>,
                      isExpanded && (
                        <tr key={order.id + '-detail'}>
                          <td colSpan="7" style={{ padding: '1rem 1.5rem', background: 'rgba(30,41,59,0.4)', borderBottom: '1px solid rgba(212,175,55,0.06)' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '1rem', fontSize: '0.8125rem' }}>
                              <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Tone:</span> <span style={{ color: '#FDFBF7' }}>{quiz.tone || '—'}</span></div>
                              <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Energy:</span> <span style={{ color: '#FDFBF7' }}>{quiz.energy || '—'}</span></div>
                              <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Relationship:</span> <span style={{ color: '#FDFBF7' }}>{quiz.relationship || '—'}</span></div>
                              <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Feelings:</span> <span style={{ color: '#FDFBF7' }}>{(quiz.feelings || []).join(', ') || '—'}</span></div>
                              <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Themes:</span> <span style={{ color: '#FDFBF7' }}>{(quiz.themes || []).join(', ') || '—'}</span></div>
                              {quiz.chorusHook && <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Chorus Hook:</span> <span style={{ color: '#FDFBF7' }}>{quiz.chorusHook}</span></div>}
                              {quiz.goldenMemory && <div style={{ gridColumn: '1 / -1' }}><span style={{ color: 'rgba(253,251,247,0.4)' }}>Golden Memory:</span> <span style={{ color: '#FDFBF7' }}>{quiz.goldenMemory}</span></div>}
                              {quiz.avoid && <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Avoid:</span> <span style={{ color: '#FDFBF7' }}>{quiz.avoid}</span></div>}
                              {order.stripe_payment_intent_id && <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Stripe PI:</span> <span style={{ color: '#FDFBF7', fontFamily: 'monospace', fontSize: '0.75rem' }}>{order.stripe_payment_intent_id}</span></div>}
                              {order.paid_at && <div><span style={{ color: 'rgba(253,251,247,0.4)' }}>Paid:</span> <span style={{ color: '#FDFBF7' }}>{new Date(order.paid_at).toLocaleString()}</span></div>}
                            </div>
                          </td>
                        </tr>
                      )
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function Dashboard({ user }) {
      const [tab, setTab] = useState('orders');
      const [requests, setRequests] = useState([]);
      const [leads, setLeads] = useState([]);
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);

      const fetchData = useCallback(async (isRefresh = false) => {
        if (isRefresh) setRefreshing(true);
        const [reqRes, leadRes, orderRes] = await Promise.all([
          _supabase.from('song_requests').select('*').is('archived_at', null).order('created_at', { ascending: false }),
          _supabase.from('spin_leads').select('*').is('archived_at', null).order('created_at', { ascending: false }),
          _supabase.from('orders').select('*').is('archived_at', null).order('created_at', { ascending: false }),
        ]);
        if (!reqRes.error && reqRes.data) setRequests(reqRes.data);
        if (!leadRes.error && leadRes.data) setLeads(leadRes.data);
        if (!orderRes.error && orderRes.data) setOrders(orderRes.data);
        setLoading(false);
        setRefreshing(false);
      }, []);

      const handleArchive = async (table, id) => {
        const { error } = await _supabase
          .from(table)
          .update({ archived_at: new Date().toISOString() })
          .eq('id', id);
        if (error) {
          console.error('Archive error:', error);
          alert('Failed to archive. Please try again.');
          return;
        }
        if (table === 'song_requests') {
          setRequests(prev => prev.filter(r => r.id !== id));
        } else if (table === 'orders') {
          setOrders(prev => prev.filter(o => o.id !== id));
        } else {
          setLeads(prev => prev.filter(l => l.id !== id));
        }
      };

      const handleOrderStatusChange = async (orderId, newStatus) => {
        const { error } = await _supabase
          .from('orders')
          .update({ status: newStatus })
          .eq('id', orderId);
        if (error) {
          console.error('Status update error:', error);
          alert('Failed to update status.');
          return;
        }
        setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status: newStatus } : o));
      };

      useEffect(() => { fetchData(); }, [fetchData]);

      if (loading) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ color: 'rgba(253,251,247,0.4)', fontSize: '0.875rem' }}>Loading...</div>
          </div>
        );
      }

      const tabs = [
        { id: 'orders', label: 'Orders', count: orders.length },
        { id: 'requests', label: 'Song Requests', count: requests.length },
        { id: 'leads', label: 'Spin Leads', count: leads.length },
      ];

      return (
        <div style={{ minHeight: '100vh' }}>
          <AdminHeader email={user.email} />
          <div style={{ maxWidth: '72rem', margin: '0 auto', padding: '2rem 1.5rem' }}>
            <StatsCards requests={requests} />

            {/* Tabs */}
            <div style={{ display: 'flex', gap: '0.25rem', marginBottom: '1.5rem', borderBottom: '1px solid rgba(212,175,55,0.1)', paddingBottom: '0' }}>
              {tabs.map((t) => (
                <button
                  key={t.id}
                  onClick={() => setTab(t.id)}
                  style={{
                    padding: '0.75rem 1.5rem',
                    fontSize: '0.8125rem',
                    fontWeight: tab === t.id ? 600 : 400,
                    color: tab === t.id ? '#D4AF37' : 'rgba(253,251,247,0.45)',
                    background: 'none',
                    border: 'none',
                    borderBottom: tab === t.id ? '2px solid #D4AF37' : '2px solid transparent',
                    cursor: 'pointer',
                    transition: 'color 0.2s, border-color 0.2s',
                    marginBottom: '-1px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '0.5rem',
                  }}
                >
                  {t.label}
                  <span style={{
                    fontSize: '0.7rem',
                    padding: '0.1rem 0.5rem',
                    borderRadius: '9999px',
                    background: tab === t.id ? 'rgba(212,175,55,0.15)' : 'rgba(253,251,247,0.06)',
                    color: tab === t.id ? '#D4AF37' : 'rgba(253,251,247,0.35)',
                  }}>{t.count}</span>
                </button>
              ))}
            </div>

            {tab === 'orders' && (
              <OrdersTable orders={orders} onRefresh={() => fetchData(true)} refreshing={refreshing} onStatusChange={handleOrderStatusChange} />
            )}
            {tab === 'requests' && (
              <RequestsTable requests={requests} onRefresh={() => fetchData(true)} refreshing={refreshing} onArchive={handleArchive} />
            )}
            {tab === 'leads' && (
              <SpinLeadsTable leads={leads} onRefresh={() => fetchData(true)} refreshing={refreshing} onArchive={handleArchive} />
            )}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       AdminApp (root)
       ════════════════════════════════════════════ */
    function AdminApp() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        _supabase.auth.getSession().then(({ data: { session } }) => {
          if (session && ALLOWED_EMAILS.includes(session.user.email.toLowerCase())) {
            setUser(session.user);
          }
          setChecking(false);
        });

        const { data: { subscription } } = _supabase.auth.onAuthStateChange((_event, session) => {
          if (session && ALLOWED_EMAILS.includes(session.user.email.toLowerCase())) {
            setUser(session.user);
          } else {
            setUser(null);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      if (checking) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ color: 'rgba(253,251,247,0.4)', fontSize: '0.875rem' }}>Loading...</div>
          </div>
        );
      }

      return user ? <Dashboard user={user} /> : <LoginPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
  </script>
</body>
</html>
