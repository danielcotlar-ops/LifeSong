<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeSong Admin</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN with custom config -->
  <script>
    window.tailwind = window.tailwind || {};
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#0F172A', light: '#1E293B', mid: '#162032' },
            gold: { DEFAULT: '#D4AF37', dark: '#B8962E', light: '#F0D060' },
            cream: { DEFAULT: '#FDFBF7', dim: '#E8E4DA' },
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <!-- React + Babel CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #0F172A;
      color: #FDFBF7;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }
    ::selection { background: rgba(212,175,55,0.3); color: #FDFBF7; }

    .btn-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #D4AF37;
      color: #0F172A;
      font-weight: 600;
      border-radius: 9999px;
      padding: 0.875rem 2rem;
      font-size: 0.9375rem;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      outline: none;
    }
    .btn-gold:hover {
      background: #E8C844;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(212,175,55,0.4);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(253,251,247,0.2);
      color: rgba(253,251,247,0.7);
      border-radius: 9999px;
      padding: 0.875rem 2rem;
      font-size: 0.9375rem;
      letter-spacing: 0.02em;
      transition: border-color 0.2s ease, color 0.2s ease;
      cursor: pointer;
      background: transparent;
      outline: none;
    }
    .btn-ghost:hover {
      border-color: rgba(212,175,55,0.5);
      color: #D4AF37;
    }

    /* Admin-specific */
    .admin-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(253,251,247,0.15);
      border-radius: 0.5rem;
      color: #FDFBF7;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .admin-input:focus {
      border-color: rgba(212,175,55,0.6);
    }
    .admin-input::placeholder {
      color: rgba(253,251,247,0.3);
    }

    table { border-collapse: collapse; width: 100%; }
    thead th {
      position: sticky;
      top: 0;
      background: #1E293B;
      z-index: 10;
    }
    tbody tr {
      transition: background 0.15s ease;
    }
    tbody tr:hover {
      background: rgba(212,175,55,0.06);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const _supabase = window.supabase.createClient(
      'https://wjulwosiewdqicevdddy.supabase.co',
      'sb_publishable_NToSonw_8bol5Fai9AGJjA_RCWOQ75J'
    );
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const ALLOWED_EMAILS = [
      'andywarthol@gmail.com',
      'george.revutsky@gmail.com',
      'danielcotlar@gmail.com',
    ];

    /* ════════════════════════════════════════════
       LoginPage
       ════════════════════════════════════════════ */
    function LoginPage({ onAuth }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        const normalizedEmail = email.trim().toLowerCase();
        if (!ALLOWED_EMAILS.includes(normalizedEmail)) {
          setError('Access denied. This portal is restricted to authorized team members.');
          return;
        }
        setLoading(true);
        const { error: authError } = await _supabase.auth.signInWithPassword({
          email: normalizedEmail,
          password,
        });
        setLoading(false);
        if (authError) {
          setError(authError.message);
        }
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1.5rem' }}>
          <div style={{
            width: '100%', maxWidth: '24rem',
            background: 'rgba(30,41,59,0.6)',
            border: '1px solid rgba(212,175,55,0.15)',
            borderRadius: '1rem',
            padding: '2.5rem 2rem',
          }}>
            <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
              <span style={{
                fontFamily: "'Playfair Display', Georgia, serif",
                fontSize: '1.75rem',
                color: '#D4AF37',
                letterSpacing: '0.05em',
              }}>LifeSong</span>
              <p style={{ marginTop: '0.5rem', fontSize: '0.8rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.4)' }}>
                Admin Portal
              </p>
            </div>

            <form onSubmit={handleSubmit}>
              <div style={{ marginBottom: '1rem' }}>
                <label style={{ display: 'block', fontSize: '0.75rem', color: 'rgba(253,251,247,0.5)', marginBottom: '0.375rem', letterSpacing: '0.05em', textTransform: 'uppercase' }}>Email</label>
                <input
                  type="email"
                  className="admin-input"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="you@example.com"
                  required
                />
              </div>
              <div style={{ marginBottom: '1.5rem' }}>
                <label style={{ display: 'block', fontSize: '0.75rem', color: 'rgba(253,251,247,0.5)', marginBottom: '0.375rem', letterSpacing: '0.05em', textTransform: 'uppercase' }}>Password</label>
                <input
                  type="password"
                  className="admin-input"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="Enter password"
                  required
                />
              </div>

              {error && (
                <div style={{
                  background: 'rgba(239,68,68,0.1)',
                  border: '1px solid rgba(239,68,68,0.3)',
                  borderRadius: '0.5rem',
                  padding: '0.75rem 1rem',
                  marginBottom: '1rem',
                  fontSize: '0.8125rem',
                  color: '#FCA5A5',
                }}>
                  {error}
                </div>
              )}

              <button
                type="submit"
                className="btn-gold"
                disabled={loading}
                style={{ width: '100%', opacity: loading ? 0.6 : 1 }}
              >
                {loading ? 'Signing in...' : 'Sign In'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       AdminHeader
       ════════════════════════════════════════════ */
    function AdminHeader({ email }) {
      const handleSignOut = async () => {
        await _supabase.auth.signOut();
      };

      return (
        <div style={{
          position: 'sticky', top: 0, zIndex: 50,
          background: 'rgba(15,23,42,0.95)',
          backdropFilter: 'blur(12px)',
          borderBottom: '1px solid rgba(212,175,55,0.12)',
          padding: '0.75rem 1.5rem',
        }}>
          <div style={{
            maxWidth: '72rem', margin: '0 auto',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <span style={{
              fontFamily: "'Playfair Display', Georgia, serif",
              fontSize: '1.25rem',
              color: '#D4AF37',
              letterSpacing: '0.05em',
            }}>
              LifeSong <span style={{ fontSize: '0.7rem', color: 'rgba(253,251,247,0.4)', letterSpacing: '0.1em', textTransform: 'uppercase', marginLeft: '0.5rem' }}>Admin</span>
            </span>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <span style={{ fontSize: '0.8125rem', color: 'rgba(253,251,247,0.5)' }}>{email}</span>
              <button
                onClick={handleSignOut}
                className="btn-ghost"
                style={{ padding: '0.5rem 1.25rem', fontSize: '0.8125rem' }}
              >
                Sign Out
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       StatsCards
       ════════════════════════════════════════════ */
    function StatsCards({ requests }) {
      const stats = useMemo(() => {
        const now = new Date();
        const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const startOfWeek = new Date(startOfToday);
        startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());

        let today = 0;
        let thisWeek = 0;
        for (const r of requests) {
          const d = new Date(r.created_at);
          if (d >= startOfToday) today++;
          if (d >= startOfWeek) thisWeek++;
        }
        return { total: requests.length, thisWeek, today };
      }, [requests]);

      const cards = [
        { label: 'Total Requests', value: stats.total },
        { label: 'This Week', value: stats.thisWeek },
        { label: 'Today', value: stats.today },
      ];

      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
          {cards.map((c) => (
            <div key={c.label} style={{
              background: 'rgba(30,41,59,0.5)',
              border: '1px solid rgba(212,175,55,0.1)',
              borderRadius: '0.75rem',
              padding: '1.25rem 1.5rem',
            }}>
              <div style={{ fontSize: '0.7rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(253,251,247,0.4)', marginBottom: '0.5rem' }}>{c.label}</div>
              <div style={{ fontSize: '2rem', fontWeight: 600, color: '#D4AF37' }}>{c.value}</div>
            </div>
          ))}
        </div>
      );
    }

    /* ════════════════════════════════════════════
       RequestsTable
       ════════════════════════════════════════════ */
    function RequestsTable({ requests, onRefresh, refreshing }) {
      const [sortKey, setSortKey] = useState('created_at');
      const [sortDir, setSortDir] = useState('desc');
      const [expandedId, setExpandedId] = useState(null);

      const handleSort = (key) => {
        if (sortKey === key) {
          setSortDir((d) => (d === 'asc' ? 'desc' : 'asc'));
        } else {
          setSortKey(key);
          setSortDir('asc');
        }
      };

      const sorted = useMemo(() => {
        return [...requests].sort((a, b) => {
          const aVal = a[sortKey] || '';
          const bVal = b[sortKey] || '';
          const cmp = typeof aVal === 'string' ? aVal.localeCompare(bVal) : aVal - bVal;
          return sortDir === 'asc' ? cmp : -cmp;
        });
      }, [requests, sortKey, sortDir]);

      const columns = [
        { key: 'created_at', label: 'Date' },
        { key: 'recipient_name', label: 'Recipient' },
        { key: 'occasion', label: 'Occasion' },
        { key: 'tone', label: 'Tone' },
        { key: 'energy', label: 'Energy' },
        { key: 'relationship', label: 'Relationship' },
      ];

      const formatDate = (iso) => {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
      };

      const arrow = (key) => {
        if (sortKey !== key) return '';
        return sortDir === 'asc' ? ' \u25B2' : ' \u25BC';
      };

      const detailFields = [
        { key: 'feelings', label: 'Feelings' },
        { key: 'themes', label: 'Themes' },
        { key: 'chorus_hook', label: 'Chorus Hook' },
        { key: 'golden_memory', label: 'Golden Memory' },
        { key: 'avoid', label: 'Avoid Topics' },
      ];

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
            <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: '1.25rem', color: '#FDFBF7', margin: 0 }}>
              Song Requests
            </h2>
            <button
              onClick={onRefresh}
              className="btn-ghost"
              disabled={refreshing}
              style={{ padding: '0.5rem 1.25rem', fontSize: '0.8125rem', opacity: refreshing ? 0.5 : 1 }}
            >
              {refreshing ? 'Refreshing...' : 'Refresh'}
            </button>
          </div>

          <div style={{ borderRadius: '0.75rem', overflow: 'hidden', border: '1px solid rgba(212,175,55,0.1)' }}>
            <div style={{ overflowX: 'auto' }}>
              <table>
                <thead>
                  <tr>
                    {columns.map((col) => (
                      <th
                        key={col.key}
                        onClick={() => handleSort(col.key)}
                        style={{
                          padding: '0.75rem 1rem',
                          textAlign: 'left',
                          fontSize: '0.7rem',
                          letterSpacing: '0.08em',
                          textTransform: 'uppercase',
                          color: sortKey === col.key ? '#D4AF37' : 'rgba(253,251,247,0.45)',
                          cursor: 'pointer',
                          userSelect: 'none',
                          whiteSpace: 'nowrap',
                          borderBottom: '1px solid rgba(212,175,55,0.1)',
                        }}
                      >
                        {col.label}{arrow(col.key)}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 && (
                    <tr>
                      <td colSpan={columns.length} style={{ padding: '3rem 1rem', textAlign: 'center', color: 'rgba(253,251,247,0.3)' }}>
                        No song requests yet
                      </td>
                    </tr>
                  )}
                  {sorted.map((row) => (
                    <React.Fragment key={row.id}>
                      <tr
                        onClick={() => setExpandedId(expandedId === row.id ? null : row.id)}
                        style={{ cursor: 'pointer', borderBottom: expandedId === row.id ? 'none' : '1px solid rgba(255,255,255,0.04)' }}
                      >
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)', whiteSpace: 'nowrap' }}>
                          {formatDate(row.created_at)}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: '#FDFBF7', fontWeight: 500 }}>
                          {row.recipient_name}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.occasion}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.tone}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.energy}
                        </td>
                        <td style={{ padding: '0.75rem 1rem', fontSize: '0.8125rem', color: 'rgba(253,251,247,0.7)' }}>
                          {row.relationship}
                        </td>
                      </tr>
                      {expandedId === row.id && (
                        <tr>
                          <td colSpan={columns.length} style={{
                            padding: '0 1rem 1rem 1rem',
                            borderBottom: '1px solid rgba(212,175,55,0.1)',
                          }}>
                            <div style={{
                              background: 'rgba(15,23,42,0.5)',
                              borderRadius: '0.5rem',
                              padding: '1rem 1.25rem',
                              display: 'grid',
                              gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
                              gap: '1rem',
                            }}>
                              {detailFields.map((f) => (
                                <div key={f.key}>
                                  <div style={{ fontSize: '0.65rem', letterSpacing: '0.08em', textTransform: 'uppercase', color: 'rgba(212,175,55,0.6)', marginBottom: '0.25rem' }}>
                                    {f.label}
                                  </div>
                                  <div style={{ fontSize: '0.8125rem', color: 'rgba(253,251,247,0.8)', lineHeight: 1.5 }}>
                                    {row[f.key] || <span style={{ color: 'rgba(253,251,247,0.25)', fontStyle: 'italic' }}>Not provided</span>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       Dashboard
       ════════════════════════════════════════════ */
    function Dashboard({ user }) {
      const [requests, setRequests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);

      const fetchRequests = useCallback(async (isRefresh = false) => {
        if (isRefresh) setRefreshing(true);
        const { data, error } = await _supabase
          .from('song_requests')
          .select('*')
          .order('created_at', { ascending: false });
        if (!error && data) setRequests(data);
        setLoading(false);
        setRefreshing(false);
      }, []);

      useEffect(() => { fetchRequests(); }, [fetchRequests]);

      if (loading) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ color: 'rgba(253,251,247,0.4)', fontSize: '0.875rem' }}>Loading...</div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh' }}>
          <AdminHeader email={user.email} />
          <div style={{ maxWidth: '72rem', margin: '0 auto', padding: '2rem 1.5rem' }}>
            <StatsCards requests={requests} />
            <RequestsTable requests={requests} onRefresh={() => fetchRequests(true)} refreshing={refreshing} />
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       AdminApp (root)
       ════════════════════════════════════════════ */
    function AdminApp() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        _supabase.auth.getSession().then(({ data: { session } }) => {
          if (session && ALLOWED_EMAILS.includes(session.user.email.toLowerCase())) {
            setUser(session.user);
          }
          setChecking(false);
        });

        const { data: { subscription } } = _supabase.auth.onAuthStateChange((_event, session) => {
          if (session && ALLOWED_EMAILS.includes(session.user.email.toLowerCase())) {
            setUser(session.user);
          } else {
            setUser(null);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      if (checking) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ color: 'rgba(253,251,247,0.4)', fontSize: '0.875rem' }}>Loading...</div>
          </div>
        );
      }

      return user ? <Dashboard user={user} /> : <LoginPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
  </script>
</body>
</html>
